<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Relay</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F4EE;
    --paper: #FFFDF8;
    --ink: #242019;
    --muted: rgba(36,32,25,0.62);
    --brand: #0C6E6E;
    --line: rgba(38,34,27,0.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #151411;
      --paper: #201E1A;
      --ink: #FBF7EF;
      --muted: rgba(251,247,239,0.62);
      --brand: #42C7BC;
      --line: rgba(250,246,237,0.10);
    }
  }
  body {
    width: 360px;
    min-height: 420px;
    background: var(--bg);
    color: var(--ink);
    font-family: "Avenir Next", "SF Pro Text", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .instant {
    padding: 16px;
  }
  .nav {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .logo {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: linear-gradient(145deg, #18A7A0 0%, #0C6E6E 58%, #083F44 100%);
    display: grid;
    place-items: center;
    box-shadow: 0 8px 18px rgba(12,110,110,0.18);
  }
  .logo svg {
    width: 23px;
    height: 23px;
    display: block;
  }
  .title {
    font-size: 17px;
    font-weight: 650;
  }
  .hero {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    min-height: 250px;
    display: grid;
    align-content: center;
    gap: 12px;
  }
  .shield {
    width: 64px;
    height: 64px;
    margin: 0 auto 6px;
    border-radius: 50%;
    background: rgba(12,110,110,0.10);
    color: var(--brand);
    display: grid;
    place-items: center;
  }
  .shield svg {
    width: 31px;
    height: 31px;
    stroke: currentColor;
    stroke-width: 1.9;
    fill: none;
  }
  h1 {
    font-size: 24px;
    line-height: 1.08;
    letter-spacing: -0.04em;
  }
  p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.45;
  }
  .pulse {
    width: 34px;
    height: 3px;
    border-radius: 999px;
    background: var(--brand);
    opacity: 0.3;
    margin: 8px auto 0;
    animation: pulse 0.9s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { transform: scaleX(0.55); opacity: 0.18; }
    to { transform: scaleX(1); opacity: 0.55; }
  }
</style>
</head>
<body>
<div class="instant" id="instantShell">
  <div class="nav">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 20 20" fill="none">
        <rect x="2" y="5" width="10" height="2.2" rx="1.1" fill="rgba(255,255,255,0.95)"/>
        <polygon points="11,2.5 15.5,6.1 11,9.7" fill="rgba(255,255,255,0.95)"/>
        <rect x="8" y="12.8" width="10" height="2.2" rx="1.1" fill="rgba(255,255,255,0.72)"/>
        <polygon points="9,10.3 4.5,13.9 9,17.5" fill="rgba(255,255,255,0.72)"/>
      </svg>
    </div>
    <div class="title">Relay</div>
  </div>
  <main class="hero">
    <div class="shield" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <h1>Bookmarks, in sync.</h1>
    <p>Opening your private vault.</p>
    <div class="pulse"></div>
  </main>
</div>
<script src="popup-bootstrap.js" defer></script>
</body>
</html>
