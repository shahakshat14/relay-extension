<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FBF7EF"/><stop offset="1" stop-color="#E9E1D3"/></linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#18A7A0"/><stop offset=".58" stop-color="#0C6E6E"/><stop offset="1" stop-color="#083F44"/></linearGradient>
    <filter id="soft"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#26221B" flood-opacity=".14"/></filter>
  </defs>
  <rect width="1280" height="800" fill="url(#paper)"/>
  <g transform="translate(76 72)">
    <g transform="translate(0 0) scale(0.1015625)">
    <rect x="56" y="56" width="400" height="400" rx="104" fill="url(#brand)"/>
    <path d="M128 178H294L252 136H322L404 218L322 300H252L294 258H128V178Z" fill="#FFFDF8"/>
    <path d="M384 334H218L260 376H190L108 294L190 212H260L218 254H384V334Z" fill="#FFFDF8" fill-opacity=".62"/>
  </g>
    <text x="70" y="28" font-family="Avenir Next, Arial, sans-serif" font-size="24" font-weight="700" fill="#242019">Relay</text>
    <text x="70" y="54" font-family="Avenir Next, Arial, sans-serif" font-size="15" fill="#6F6659">Private bookmark sync</text>
    <text x="0" y="136" font-family="Avenir Next, Arial, sans-serif" font-size="46" font-weight="700" fill="#242019">Private by default.</text>
    <text x="0" y="178" font-family="Avenir Next, Arial, sans-serif" font-size="22" fill="#6F6659">Relay is designed to sync bookmarks without turning them into a profile.</text>
  </g>
  <g transform="translate(820 132)" filter="url(#soft)">
    <rect width="360" height="560" rx="22" fill="#FFFDF8" stroke="#D8CFC0"/>
    
      <rect x="0" y="0" width="360" height="560" rx="22" fill="#FBF7EF"/>
      <text x="24" y="42" font-family="Avenir Next, Arial" font-size="18" font-weight="850" fill="#242019">Privacy</text>
      <rect x="24" y="84" width="312" height="64" rx="10" fill="#FFFDF8" stroke="#D8CFC0"/>
  <circle cx="55" cy="116" r="16" fill="#E9F4F1"/>
  <path d="M47 116l6 6 11-13" fill="none" stroke="#0C6E6E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="84" y="111" font-family="Avenir Next, Arial" font-size="15" font-weight="750" fill="#242019">No email required</text>
  <text x="84" y="132" font-family="Avenir Next, Arial" font-size="12.5" fill="#6F6659">Use a username and password only.</text>
      <rect x="24" y="166" width="312" height="64" rx="10" fill="#FFFDF8" stroke="#D8CFC0"/>
  <circle cx="55" cy="198" r="16" fill="#E9F4F1"/>
  <path d="M47 198l6 6 11-13" fill="none" stroke="#0C6E6E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="84" y="193" font-family="Avenir Next, Arial" font-size="15" font-weight="750" fill="#242019">Encrypted before upload</text>
  <text x="84" y="214" font-family="Avenir Next, Arial" font-size="12.5" fill="#6F6659">Bookmarks leave as unreadable data.</text>
      <rect x="24" y="248" width="312" height="64" rx="10" fill="#FFFDF8" stroke="#D8CFC0"/>
  <circle cx="55" cy="280" r="16" fill="#E9F4F1"/>
  <path d="M47 280l6 6 11-13" fill="none" stroke="#0C6E6E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="84" y="275" font-family="Avenir Next, Arial" font-size="15" font-weight="750" fill="#242019">No tracking pixels</text>
  <text x="84" y="296" font-family="Avenir Next, Arial" font-size="12.5" fill="#6F6659">No analytics SDK or ad network.</text>
      <rect x="24" y="330" width="312" height="64" rx="10" fill="#FFFDF8" stroke="#D8CFC0"/>
  <circle cx="55" cy="362" r="16" fill="#E9F4F1"/>
  <path d="M47 362l6 6 11-13" fill="none" stroke="#0C6E6E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="84" y="357" font-family="Avenir Next, Arial" font-size="15" font-weight="750" fill="#242019">Minimal controls</text>
  <text x="84" y="378" font-family="Avenir Next, Arial" font-size="12.5" fill="#6F6659">Sync, restore, update, delete.</text>
      <rect x="24" y="430" width="312" height="78" rx="16" fill="#E9F4F1" stroke="#BFDCD5"/>
      <text x="48" y="462" font-family="Avenir Next, Arial" font-size="16" font-weight="850" fill="#0C6E6E">Quiet by design</text>
      <text x="48" y="488" font-family="Avenir Next, Arial" font-size="13" fill="#2D6F6A">Relay keeps sync useful, not nosy.</text>
    
  </g>
</svg>