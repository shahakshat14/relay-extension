<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relay Admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, sans-serif;
  background: #0f0f12; color: #f0f0f0;
  min-height: 100vh; padding: 40px 20px;
  -webkit-font-smoothing: antialiased;
}
.wrap { max-width: 640px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.sub { font-size: 13px; color: #60606a; margin-bottom: 32px; }

.card {
  background: #1a1a24; border: 1px solid rgba(255,255,255,.08);
  border-radius: 14px; padding: 24px; margin-bottom: 16px;
}
.card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }

.row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }

.inp {
  flex: 1; min-width: 140px; padding: 10px 13px;
  background: #0f0f12; border: 1px solid rgba(255,255,255,.1);
  border-radius: 9px; color: #f0f0f0; font-size: 13.5px;
  font-family: inherit; outline: none; transition: border-color .15s;
}
.inp:focus { border-color: rgba(67,97,238,.5); }
.inp::placeholder { color: #404048; }

.btn {
  padding: 10px 18px; border: none; border-radius: 9px;
  font-size: 13.5px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all .15s; white-space: nowrap;
}
.btn-blue  { background: #4361ee; color: #fff; }
.btn-blue:hover  { background: #3451d1; }
.btn-blue:disabled  { opacity: .4; cursor: default; }
.btn-red   { background: rgba(231,76,60,.15); color: #e74c3c; border: 1px solid rgba(231,76,60,.3); }
.btn-red:hover { background: rgba(231,76,60,.25); }

.codes-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }

.code-item {
  display: flex; align-items: center; gap: 10px;
  background: #0f0f12; border: 1px solid rgba(255,255,255,.07);
  border-radius: 9px; padding: 10px 13px;
}
.code-val {
  font-family: ui-monospace, monospace; font-size: 15px;
  font-weight: 700; letter-spacing: 2px; flex: 1; color: #4361ee;
}
.code-meta { font-size: 11px; color: #60606a; white-space: nowrap; }
.code-used { opacity: .4; }
.copy-btn {
  background: none; border: none; cursor: pointer;
  font-size: 12px; color: #4361ee; padding: 0; font-family: inherit;
}
.copy-btn:hover { opacity: .7; }

.tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
.tag-free { background: rgba(45,198,83,.12); color: #2dc653; }
.tag-used { background: rgba(255,255,255,.06); color: #60606a; }

.toast-g {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1a1a24; border: 1px solid rgba(255,255,255,.1);
  border-radius: 10px; padding: 10px 18px; font-size: 13px;
  display: none; white-space: nowrap; z-index: 100;
}
.toast-g.show { display: block; animation: fadeUp .2s ease; }
@keyframes fadeUp {
  from { opacity:0; transform:translateX(-50%) translateY(6px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}

.gate { max-width: 320px; margin: 120px auto; text-align: center; }
.gate h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.gate p  { font-size: 13px; color: #60606a; margin-bottom: 20px; }

.sp {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid rgba(255,255,255,.2); border-top-color: #fff;
  border-radius: 50%; animation: spin .65s linear infinite; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.err-msg { font-size: 12px; color: #e63946; margin-top: 8px; }
</style>
</head>
<body>

<div id="gate" class="gate">
  <h2>🔐 Relay Admin</h2>
  <p>Enter your admin password to continue.</p>
  <input class="inp" id="gateInput" type="password" placeholder="Admin password…"
    style="width:100%;margin-bottom:10px;text-align:center">
  <button class="btn btn-blue" style="width:100%" id="gateBtn">Enter</button>
  <div class="err-msg" id="gateErr"></div>
</div>

<div id="app" style="display:none">
<div class="wrap">
  <h1>Relay Admin</h1>
  <div class="sub">Generate and manage gift codes</div>

  <div class="card">
    <h2>Generate Gift Codes</h2>
    <div class="row">
      <input class="inp" id="numCodes" type="number" value="1" min="1" max="50"
        placeholder="Count" style="max-width:80px">
      <input class="inp" id="codeDays" type="number" value="365" min="1"
        placeholder="Days" style="max-width:100px">
      <input class="inp" id="codeNote" type="text"
        placeholder="Note (e.g. for John)" style="flex:2">
      <button class="btn btn-blue" id="btnGenerate">Generate</button>
    </div>
    <div id="newCodes" class="codes-list"></div>
  </div>

  <div class="card">
    <h2>All Codes</h2>
    <div class="row" style="margin-bottom:0">
      <input class="inp" id="filterInput" placeholder="Search codes or notes…">
    </div>
    <div id="allCodes" class="codes-list"></div>
  </div>
</div>
</div>

<div class="toast-g" id="toastG"></div>

<script>
const SUPABASE_URL  = 'https://mgeiplftbehngfsqtbiq.supabase.co';
const ADMIN_FN_URL  = `${SUPABASE_URL}/functions/v1/admin-gift-codes`;
const SUPABASE_KEY  = 'sb_publishable_3BVQxcUH_AljAaamBNrhBA_7knbqxFI';

let adminPassword = ''; // kept in memory only, never stored

// ── Auth gate ───────────────────────────────────────────────────
async function checkGate() {
  const pwd = document.getElementById('gateInput').value;
  if (!pwd) return;

  const btn = document.getElementById('gateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span> Checking…';
  document.getElementById('gateErr').textContent = '';

  // Verify by making a real API call — if it works, password is correct
  try {
    const res = await api('list', { password: pwd });
    if (res.error === 'Unauthorized') {
      document.getElementById('gateErr').textContent = 'Wrong password.';
      btn.disabled = false;
      btn.textContent = 'Enter';
      return;
    }
    // Success — store password in memory and show app
    adminPassword = pwd;
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display  = 'block';
    renderCodes(res.codes || []);
  } catch (err) {
    document.getElementById('gateErr').textContent = 'Connection error. Try again.';
    btn.disabled = false;
    btn.textContent = 'Enter';
  }
}

document.getElementById('gateInput').addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') await checkGate();
});
document.getElementById('gateBtn').addEventListener('click', checkGate);
document.getElementById('btnGenerate').addEventListener('click', generateCodes);
document.getElementById('filterInput').addEventListener('input', e => loadCodes(e.target.value));

// ── API wrapper — all calls go through the Edge Function ────────
async function api(action, extra = {}) {
  const res = await fetch(ADMIN_FN_URL, {
    method: 'POST',
    headers: {
      'apikey':        SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type':  'application/json',
    },
    body: JSON.stringify({ action, password: adminPassword, ...extra }),
  });
  return await res.json();
}

// ── Generate codes ──────────────────────────────────────────────
async function generateCodes() {
  const count = document.getElementById('numCodes').value;
  const days  = document.getElementById('codeDays').value;
  const note  = document.getElementById('codeNote').value.trim();

  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  btn.innerHTML = '<span class="sp"></span>';

  try {
    const res = await api('generate', { count, days, note });
    btn.disabled = false;
    btn.textContent = 'Generate';

    if (res.error) { showToast('Error: ' + res.error); return; }

    renderCodeList(document.getElementById('newCodes'), res.codes || [], true);
    showToast(`✓ ${res.codes.length} code${res.codes.length === 1 ? '' : 's'} generated`);
    loadCodes();
  } catch {
    btn.disabled = false;
    btn.textContent = 'Generate';
    showToast('Network error. Try again.');
  }
}

// ── Load / filter codes ─────────────────────────────────────────
let loadTimer = null;
async function loadCodes(filter = '') {
  clearTimeout(loadTimer);
  loadTimer = setTimeout(async () => {
    const res = await api('list', { filter });
    if (res.error) { showToast('Error: ' + res.error); return; }
    renderCodes(res.codes || []);
  }, filter ? 300 : 0);
}

function renderCodes(codes) {
  renderCodeList(document.getElementById('allCodes'), codes);
}

// ── Code rendering ───────────────────────────────────────────────
function renderCodeList(el, codes, highlight = false) {
  el.textContent = '';
  if (!codes.length) {
    const empty = document.createElement('div');
    empty.style.cssText = 'font-size:13px;color:#404048;padding:12px 0';
    empty.textContent = 'No codes yet.';
    el.appendChild(empty);
    return;
  }
  codes.forEach(c => el.appendChild(codeElement(c, highlight)));
}

function codeElement(c, highlight = false) {
  const used = !!c.redeemed_at;
  const date = new Date(c.created_at);
  const item = document.createElement('div');
  item.className = `code-item${used ? ' code-used' : ''}`;
  if (highlight) item.style.cssText = 'border-color:rgba(67,97,238,.3);background:rgba(67,97,238,.06)';

  const code = document.createElement('span');
  code.className = 'code-val';
  code.textContent = c.code || '';

  const meta = document.createElement('span');
  meta.className = 'code-meta';
  meta.textContent = `${Number(c.duration_days) || 0}d · ${isNaN(date) ? '' : date.toLocaleDateString()}${c.note ? ` · ${c.note}` : ''}`;

  const tag = document.createElement('span');
  tag.className = `tag ${used ? 'tag-used' : 'tag-free'}`;
  tag.textContent = used ? 'Used' : 'Active';

  item.append(code, meta, tag);
  if (!used) {
    const copy = document.createElement('button');
    copy.className = 'copy-btn';
    copy.textContent = 'Copy';
    copy.addEventListener('click', () => copyCode(c.code || ''));

    const del = document.createElement('button');
    del.className = 'btn-red btn';
    del.style.cssText = 'padding:4px 10px;font-size:11px';
    del.textContent = 'Delete';
    del.addEventListener('click', () => deleteCode(c.code || ''));
    item.append(copy, del);
  }
  return item;
}

// ── Actions ─────────────────────────────────────────────────────
async function copyCode(code) {
  await navigator.clipboard.writeText(code);
  showToast(`Copied ${code}`);
}

async function deleteCode(code) {
  if (!confirm(`Delete code ${code}? This cannot be undone.`)) return;
  const res = await api('delete', { code });
  if (res.error) { showToast('Error: ' + res.error); return; }
  showToast(`Deleted ${code}`);
  loadCodes();
}

// ── Toast ────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toastG');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}
</script>
</body>
</html>
