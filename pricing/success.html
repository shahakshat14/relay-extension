<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Relay Pro!</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #f7f7f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; -webkit-font-smoothing: antialiased; }
  .card { background: #fff; border-radius: 18px; padding: 40px 36px; text-align: center; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
  .icon { font-size: 52px; margin-bottom: 16px; }
  h1 { font-size: 24px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 10px; }
  p  { font-size: 14px; color: #60606a; line-height: 1.65; margin-bottom: 24px; }
  .steps { text-align: left; background: #f7f7f8; border-radius: 12px; padding: 16px 18px; margin-bottom: 24px; }
  .step { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: #0f0f12; margin-bottom: 10px; }
  .step:last-child { margin-bottom: 0; }
  .num { width: 20px; height: 20px; border-radius: 50%; background: #4361ee; color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  a.btn { display: inline-block; background: #4361ee; color: #fff; padding: 12px 28px; border-radius: 12px; font-size: 14px; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎉</div>
  <h1>You're on Relay Pro!</h1>
  <p>Your subscription is active. Open Relay in any browser and it will pick up your Pro plan automatically on next sync.</p>
  <div class="steps">
    <div class="step"><div class="num">1</div><span>Open Relay in your browser</span></div>
    <div class="step"><div class="num">2</div><span>Sign in with your username and password</span></div>
    <div class="step"><div class="num">3</div><span>Tap Sync — Pro features are active</span></div>
  </div>
  <a class="btn" href="https://chrome.google.com/webstore">Open Chrome Extensions</a>
</div>
</body>
</html>
